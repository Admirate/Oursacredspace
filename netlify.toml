[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps --include=dev"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# API redirects to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Security Headers (OWASP Best Practices)
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    # XSS Protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    # Enforce HTTPS (enable in production)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Restrict browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    # NOTE: Content-Security-Policy is intentionally NOT set here. It is defined
    # in next.config.mjs (async headers) so it can differ by environment —
    # 'unsafe-eval' is required by React/Turbopack in dev but must be excluded
    # in production (SEC-015). Setting it here too would emit two CSP headers,
    # and the browser enforces their intersection, re-breaking local dev.

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
